name: Continuous Integration (CI)
on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # 소스코드 불러오기
      - name: Checkout Source Code
        uses: actions/checkout@v6

      - name: Create .env file
        run: |
          echo "AWS_S3_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY_ID }}" >> .env
          echo "AWS_S3_SECRET_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> .env
          echo "AWS_S3_REGION=${{ vars.AWS_REGION }}" >> .env
          echo "AWS_S3_BUCKET=${{ vars.AWS_S3_BUCKET }}" >> .env
          echo "STORAGE_TYPE=s3" >> .env
          echo "AWS_S3_PRESIGNED_URL_EXPIRATION=600" >> .env

      # JDK 17 설치
      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle' # 빌드 속도 최적화

      # Gradle 빌드
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Test with Gradle
        run: ./gradlew test

      # CodeCov 테스트 커버리지 리포트 업로드
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}


