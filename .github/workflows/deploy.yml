name: Continuous Deployment (CD)
on:
  push:
    branches:
      - release

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY_URI: ${{ vars.ECR_REPOSITORY_URI }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
  ECS_SERVICE: ${{ vars.ECS_SERVICE }}
  ECS_TASK_DEFINITION: ${{ vars.ECS_TASK_DEFINITION }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs: # 다음 Job으로 넘겨줄 변수 선언
      image_tag: ${{ steps.set-tag.outputs.IMAGE_TAG }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # [수정 1] 정확한 Secrets 이름 사용
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon Public ECR
        id: login-ecr-public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      # [수정 2] 정확한 id와 GITHUB_OUTPUT 사용
      - name: Set Image Tag
        id: set-tag
        run: |
          TAG=${GITHUB_SHA::7}
          echo "IMAGE_TAG=$TAG" >> $GITHUB_ENV
          echo "IMAGE_TAG=$TAG" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ vars.ECR_REPOSITORY_URI }}
        run: |
          docker build -t $ECR_REPOSITORY_URI:$IMAGE_TAG -t $ECR_REPOSITORY_URI:latest .
          docker push $ECR_REPOSITORY_URI:$IMAGE_TAG
          docker push $ECR_REPOSITORY_URI:latest

  update-ecs:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      # [수정 1] 정확한 Secrets 이름 사용
      - name: Configure AWS credentials for ECS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update task definition with new image
        env:
          NEW_IMAGE: ${{ env.ECR_REPOSITORY_URI }}:${{ needs.build-and-push.outputs.image_tag }}
        run: |
          aws ecs describe-task-definition --task-definition $ECS_TASK_DEFINITION --query taskDefinition > task-definition.json
          # 주의: "discodeit-app"이 실제 컨테이너 이름과 맞는지 꼭 확인!
          jq --arg img "$NEW_IMAGE" '(.containerDefinitions[] | select(.name == "discodeit-app")).image = $img' task-definition.json > new-task-def.json

      # [수정 3] 분리되어 있던 단계를 하나로 합치고 강제 배포 옵션 추가
      - name: Register and update ECS service
        run: |
          # 1. 새 태스크 정의 등록
          NEW_TASK_INFO=$(aws ecs register-task-definition --cli-input-json file://new-task-def.json)
          NEW_REVISION=$(echo $NEW_TASK_INFO | jq '.taskDefinition.revision')
          
          # 2. 새 리비전으로 강제 배포 (desired-count 1로 덮어쓰기)
          aws ecs update-service --cluster $ECS_CLUSTER \
                                 --service $ECS_SERVICE \
                                 --task-definition $ECS_TASK_DEFINITION:$NEW_REVISION \
                                 --desired-count 1 \
                                 --force-new-deployment
          
          # 3. 배포가 안정화될 때까지 대기
          aws ecs wait services-stable --cluster $ECS_CLUSTER --services $ECS_SERVICE