server:
  port: 8080
  tomcat:
    max-swallow-size: 50MB

logging:
  level:
    org.hibernate.orm.queries: debug # 실행되는 쿼리 상세 로그

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/discodeit  # DB?? ?? ??
    username: discodeit_user
    password: discodeit1234
    driver-class-name: org.postgresql.Driver

  sql:
    init:
      mode: embedded #always는 외부 DB일 때도 실행, embedded는 H2같은 내장 메모리 DB일 때 실행

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true   # SQL 키워드 색상 강조 (인텔리제이 콘솔)
        use_sql_comments: true # 어떤 메서드 때문에 이 쿼리가 나갔는지 주석 표시
    open-in-view: false

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

discodeit:
  repository:
    type: file   # jcf | file
    file-directory: .discodeit

  storage:
    type: local
    local:
      root-path: ./discodeit/storage