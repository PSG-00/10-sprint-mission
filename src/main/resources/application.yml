spring:
  config:
    import: optional:file:.env[.properties]
  profiles:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB
  sql:
    init:
      mode: embedded # H2 같은 내장 DB일 때만 초기화 스크립트 실행

server:
  tomcat:
    max-swallow-size: 50MB

# 프로젝트 파일 저장 설정
discodeit:
  storage:
    type: ${STORAGE_TYPE:local}  # local | s3 (기본값: local)
    local:
      root-path: ${STORAGE_LOCAL_ROOT_PATH:.discodeit/storage}

# AWS 설정
aws:
  s3:
    access-key: ${AWS_S3_ACCESS_KEY}
    secret-key: ${AWS_S3_SECRET_KEY}
    region: ${AWS_S3_REGION}
    bucket: ${AWS_S3_BUCKET}
    presigned-url-expiration: ${AWS_S3_PRESIGNED_URL_EXPIRATION:600} # (기본값: 10분)

# Actuator 설정
management:
   endpoints:
     web:
       exposure:
         include: "health,info,metrics,loggers" # 요청하신 4개 엔드포인트 노출
   info:
     env:
       enabled: true # 환경 변수 정보를 info에 포함하도록 설정

 # Actuator info에 노출될 애플리케이션 정보
info:
  app:
    name: Discodeit
    version: 1.7.0
    java-version: 17
    spring-boot-version: 3.4.0
  # 주요 설정 정보
  config:
     datasource:
       url: ${spring.datasource.url}
       driver-class-name: ${spring.datasource.driver-class-name}
     jpa:
       ddl-auto: ${spring.jpa.hibernate.ddl-auto}
     storage:
       type: ${discodeit.storage.type:local} # 실제 설정 키값에 맞춰 수정 필요
       path: ${discodeit.storage.local.path:./discodeit/storage}
     multipart:
      max-file-size: ${spring.servlet.multipart.max-file-size}
      max-request-size: ${spring.servlet.multipart.max-request-size}